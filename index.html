<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asesmen Leadership - Araya Consulting</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-placeholder">
            <img src="logo-araya.png" alt="Logo Araya Consulting">
        </div>

        <div id="registration-screen">
            <h2>Leadership Strategic Assessment</h2>
            <p>Silakan isi data diri Anda untuk memulai asesmen:</p>
            <input type="text" id="user-name" placeholder="Nama Lengkap" required>
            <input type="tel" id="user-phone" placeholder="Nomor WhatsApp (Contoh: 0812...)" required>
            <button type="button" onclick="startTest()" id="primary-btn">Mulai Tes Sekarang</button>
        </div>

        <div id="quiz-content" class="hidden">
            <div id="quiz-header"></div>
            <div id="questions-container"></div>
            <div class="nav-btns">
                <button type="button" id="prev-btn" class="hidden">Kembali</button>
                <button type="button" id="next-btn" disabled>Selanjutnya</button>
            </div>
            <div class="submit-wrapper">
                <button type="button" id="submit-btn" class="hidden">Lihat Hasil Penilaian</button>
            </div>
        </div>

        <div id="results" class="hidden">
            <h3>Laporan Ringkas: <span id="display-name" style="color:#007bff;"></span></h3>
            <div id="level-result-summary"></div>
            
            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>
            
            <div class="activation-box">
                <h4>Unduh Sertifikat & Analisis Lengkap</h4>
                <p>Dapatkan laporan PDF resmi dengan deskripsi karakter dan rekomendasi strategis 90 hari.</p>
                <button onclick="requestAccess()" class="wa-btn">Minta Kode Aktivasi (WhatsApp)</button>
                <div class="input-group">
                    <input type="text" id="access-code" placeholder="Masukkan Kode Aktivasi">
                    <button onclick="unlockCertificate()" class="unlock-btn">Buka Laporan Penuh</button>
                </div>
            </div>

            <div id="cert-area" class="hidden">
                <button id="download-btn" class="download-btn">Download Sertifikat (PDF A4)</button>
                <button onclick="location.reload()" class="reload-btn">Ulangi Tes</button>
            </div>
        </div>
    </div>

    <div id="certificate-wrapper" style="display:none;"></div>

    <script src="script.js"></script>
</body>
</html>
