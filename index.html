<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leadership Assessment - Araya Consulting</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-placeholder">
            <img src="logo-araya.png" alt="Logo Araya Consulting">
        </div>

        <div id="registration-screen">
            <h2>Leadership Strategic Assessment</h2>
            <p>Silakan isi data diri untuk memulai:</p>
            <input type="text" id="user-name" placeholder="Nama Lengkap">
            <input type="tel" id="user-phone" placeholder="Nomor WhatsApp">
            <button type="button" onclick="startTest()" id="primary-btn">Mulai Tes Sekarang</button>
        </div>

        <div id="quiz-content" class="hidden">
            <div id="quiz-header"></div>
            <div id="questions-container"></div>
            <div class="nav-btns">
                <button type="button" id="prev-btn" class="hidden">Kembali</button>
                <button type="button" id="next-btn">Selanjutnya</button>
                <button type="button" id="submit-btn" class="hidden" onclick="calculateResults()">Lihat Hasil Penilaian</button>
            </div>
        </div>

        <div id="results" class="hidden">
            <div id="level-result-summary"></div>
            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>
            
            <div class="activation-box">
                <div id="persuasive-text"></div>
                <button type="button" onclick="requestAccess()" class="wa-btn">Beli Kode via WhatsApp</button>
                <div class="input-group">
                    <input type="text" id="access-code" placeholder="Masukkan Kode Aktivasi">
                    <button type="button" onclick="unlockCertificate()" class="unlock-btn">Buka Akses Sertifikat</button>
                </div>
            </div>

            <div id="cert-area" class="hidden">
                <button id="download-btn" class="download-btn">Download Sertifikat (PDF)</button>
                <button type="button" onclick="location.reload()" class="reload-btn">Tes Ulang</button>
            </div>
        </div>
    </div>
    <div id="certificate-wrapper" style="display:none;"></div>
    <script src="script.js"></script>
</body>
</html>
