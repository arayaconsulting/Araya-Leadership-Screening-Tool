<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leadership Assessment | Araya Consulting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="container">
        <div class="main-card">
            <header>
                <img src="logo-araya.png" alt="Araya Logo" class="app-logo">
            </header>

            <div id="registration-screen">
                <h1 class="title">Leadership Strategic</h1>
                <p class="subtitle">Identifikasi level kepemimpinan Anda dan temukan peta jalan menuju level tertinggi.</p>
                <div class="input-group">
                    <input type="text" id="user-name" placeholder="Nama Lengkap Anda" autocomplete="off">
                    <input type="tel" id="user-phone" placeholder="WhatsApp (08xx...)">
                </div>
                <button onclick="startTest()" id="primary-btn">Mulai Analisis Sekarang</button>
            </div>

            <div id="quiz-content" class="hidden">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="quiz-header"></div>
                <div id="questions-container"></div>
                <div class="nav-btns">
                    <button id="prev-btn" class="hidden">Kembali</button>
                    <button id="next-btn">Selanjutnya</button>
                    <button id="submit-btn" class="hidden" onclick="calculateResults()">Selesaikan Penilaian</button>
                </div>
            </div>

            <div id="results" class="hidden">
                <div id="level-result-summary"></div>
                <div class="chart-box">
                    <canvas id="scoreChart"></canvas>
                </div>
                
                <div class="premium-box">
                    <div id="persuasive-call-to-action"></div>
                    <button onclick="requestAccess()" class="wa-btn">Dapatkan Aktivasi (WhatsApp)</button>
                    <div class="activation-form">
                        <input type="text" id="access-code" placeholder="Kode Aktivasi">
                        <button onclick="unlockCertificate()" class="unlock-btn">Unduh Laporan</button>
                    </div>
                </div>

                <div id="cert-area" class="hidden">
                    <div class="success-msg">Laporan Berhasil Diunduh!</div>
                    <button onclick="location.reload()" class="reload-btn">Tes Ulang</button>
                </div>
            </div>
        </div>
    </div>

    <div id="certificate-wrapper" style="position: absolute; left: -9999px; top: 0;"></div>

    <script src="script.js"></script>
</body>
</html>
